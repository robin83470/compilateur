name: CI Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libantlr4-runtime-dev python3 python3-pip g++ make curl

      - name: Install Python deps
        run: |
          pip3 install --user pytest

      - name: Download ANTLR Complete JAR
        run: |
          # On télécharge la version exacte 4.13.2
          curl -L https://www.antlr.org/download/antlr-4.13.2-complete.jar -o ./antlr-4.13.2-complete.jar

      - name: Create config.mk for GitHub
        run: |
          # On utilise le JAR qu'on vient de télécharger
          # On utilise le chemin absolu avec $GITHUB_WORKSPACE
          echo "ANTLRJAR=$GITHUB_WORKSPACE/antlr-4.13.2-complete.jar" > compiler/config.mk
          echo "ANTLRINC=/usr/include/antlr4-runtime/" >> compiler/config.mk
          echo "ANTLRLIB=/usr/lib/x86_64-linux-gnu/libantlr4-runtime.a" >> compiler/config.mk

      - name: Compile
        run: |
          export CLASSPATH=".:$GITHUB_WORKSPACE/antlr-4.13.2-complete.jar:$CLASSPATH"
          make -C compiler

      - name: Run ifcc tests
        run: python3 ./ifcc-test.py testfiles