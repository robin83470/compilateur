name: CI Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y antlr4 libantlr4-runtime-dev python3 python3-pip g++ make

      - name: Install Python deps
        run: |
          pip3 install --user pytest

      - name: Create config.mk for GitHub
        run: |
          echo "ANTLRJAR=/usr/share/java/antlr4.jar" > compiler/config.mk
          echo "ANTLRINC=/usr/include/antlr4-runtime/" >> compiler/config.mk
          echo "ANTLRLIB=/usr/lib/x86_64-linux-gnu/libantlr4-runtime.a" >> compiler/config.mk

      - name: Compile
        run: make -C compiler

      - name: Run ifcc tests
        run: python3 ./ifcc-test.py testfiles